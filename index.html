<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>🎉 عيد ميلاد سعيد 🎉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #ff7a18, #ff2df1);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .card {
      background: rgba(0,0,0,0.25);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      animation: fadeIn 1.5s ease;
      max-width: 600px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
    }

    .balloons {
      font-size: 50px;
      margin-bottom: 20px;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="balloons">🎉🎂🎈</div>
    <h1>عيد ميلاد سعيد</h1>
    <h2>🎁 يا أغلى الناس 🎁</h2>
    <p>
      كل سنة وإنت طيب 💖  
      عقبال مليون سنة صحة وسعادة ونجاح  
      ربنا يحققلك كل اللي بتتمناه 🌟
    </p>
  </div>
</body>
</html>
