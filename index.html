<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: black;
      color: #fff;
      overflow: hidden;
    }

    /* شاشة البداية */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
      cursor: pointer;
      z-index: 10;
      animation: pulse 1.5s infinite;
    }

    /* نبض */
    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.4;
        transform: scale(1.1);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* المحتوى */
    #mainContent {
      display: none;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      padding-top: 80px;
    }

    .message {
      font-size: 2em;
      animation: fadeIn 2s ease-in-out forwards;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>

<body>

  <!-- شاشة سودة -->
  <div id="intro" onclick="startSurprise()">
    Tap anywhere 💖
  </div>

  <!-- المحتوى -->
  <div id="mainContent">
    <div class="message" id="message"></div>
  </div>

  <!-- فيديو مخفي لتشغيل الأغنية -->
  <iframe id="ytPlayer"
  width="0" height="0"
  src=""
  frameborder="0"
  allow="autoplay">
  </iframe>

  <script>
    function startSurprise() {
      document.getElementById("intro").style.display = "none";
      document.getElementById("mainContent").style.display = "block";

      document.getElementById("message").innerHTML = `
      ❤️ Happy Birthday my beautiful girl ❤️ <br><br>
      Wishing you all the happiness, love, and success in the world. <br><br>
      May all your dreams come true, Hebaz 🎂✨
      `;

      // تشغيل الأغنية من 54 ثانية
      document.getElementById("ytPlayer").src =
        "https://www.youtube.com/embed/SOJpE1KMUbo?start=54&autoplay=1";

      launchConfetti();
    }

    function launchConfetti() {
      for (let i = 0; i < 120; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        confetti.style.backgroundColor = getRandomColor();

        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 5000);
      }
    }

    function getRandomColor() {
      const colors = ["#ff6b81", "#feca57", "#48dbfb", "#1dd1a1", "#5f27cd"];
      return colors[Math.floor(Math.random() * colors.length)];
    }
  </script>

</body>
</html>
